# Development nginx config — proxies to Vite dev server for HMR
worker_processes 1;
events { worker_connections 256; }

http {
    include /etc/nginx/mime.types;

    upstream api    { server api:3000; }
    upstream qlever { server qlever:7001; }
    upstream vite   { server host.docker.internal:5173; }

    server {
        listen 80;

        location /api/   { proxy_pass http://api; }
        location /sparql { proxy_pass http://api/sparql; }

        # Vite HMR websocket
        location /_vite/ {
            proxy_pass http://vite;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location / {
            proxy_pass http://vite;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
